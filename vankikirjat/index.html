<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Viewer</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #111;
      color: white;
      font-family: sans-serif;
      text-align: center;
    }

    .image-block {
      margin-bottom: 50px;
    }

    img {
      max-width: 100%;
      height: auto;
      border: 1px solid #444;
    }

    .filename {
      margin-top: 10px;
      color: #ccc;
      font-size: 14px;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <div class="image-block">
    <img src="Beb12_vankipaivakirja_1873_01.jpg" alt="">
    <div class="filename">Beb12_vankipaivakirja_1873_01.jpg</div>
  </div>

  <div class="image-block">
    <img src="Beb12_vankipaivakirja_1873_02.jpg" alt="">
    <div class="filename">Beb12_vankipaivakirja_1873_02.jpg</div>
  </div>

  <div class="image-block">
    <img src="Beb12_vankipaivakirja_1874.jpg" alt="">
    <div class="filename">Beb12_vankipaivakirja_1874.jpg</div>
  </div>

  <div class="image-block">
    <img src="eb99_vankiluettelo_lokakuu_1873_.jpg" alt="">
    <div class="filename">eb99_vankiluettelo_lokakuu_1873_.jpg</div>
  </div>

  <div class="image-block">
    <img src="eb99_vankiluettelo_marraskuu_1873_.jpg" alt="">
    <div class="filename">eb99_vankiluettelo_marraskuu_1873_.jpg</div>
  </div>

</body>
</html>
